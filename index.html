<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İmtahan Balı Hesablayıcı</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --transition-speed: 0.3s;
        }

        /* Səhifənin ümumi sıfırlanması və animasiya girişi */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        /* Başlıq sahəsi animasiyalı */
        header {
            background: linear-gradient(135deg, var(--primary-color), #1a252f);
            color: #fff;
            padding: 25px 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            transition: transform var(--transition-speed);
        }
        header:hover {
            transform: translateY(-2px);
        }

        header h1 {
            margin: 0;
            font-size: clamp(18px, 4vw, 24px); /* Mobil cihazlarda kiçilir */
            letter-spacing: 1px;
        }

        /* Seçim qutusu */
        .group-selector-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            justify-content: center;
            transition: box-shadow var(--transition-speed);
        }
        .group-selector-box:hover {
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        /* Seçim menyusu - mobil üçün tam uyğunlaşdırıldı */
        .group-select {
            width: 100%;
            max-width: 400px;
            padding: 12px 15px;
            font-size: 15px;
            border-radius: 8px;
            border: 2px solid #ddd;
            background-color: white;
            color: var(--primary-color);
            cursor: pointer;
            font-weight: bold;
            outline: none;
            transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
        }
        .group-select:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
        }

        /* Ümumi Bal sahəsi pulsasiya animasiyası ilə */
        .total-score {
            background: #e8f4fd;
            padding: 18px;
            border-radius: 8px;
            text-align: center;
            font-size: clamp(18px, 4vw, 22px);
            color: var(--secondary-color);
            font-weight: bold;
            border: 1px solid #d4e6f1;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: all var(--transition-speed);
        }
        .total-score.updated {
            animation: pulse 0.4s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); background-color: #d4e6f1; }
            100% { transform: scale(1); }
        }

        /* Kartların Grid sistemi - Responsive */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Fənn kartları və hover effektləri */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            overflow: hidden;
            border-top: 5px solid var(--secondary-color);
            transition: transform var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.08);
        }

        .card-header {
            background: #f8f9fa;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .nisbi-bal {
            background: var(--primary-color);
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            transition: transform 0.2s;
        }

        .card-body {
            padding: 20px;
        }

        /* Daxiletmə sahələri düzəlişi */
        .input-group {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .input-group:last-child {
            margin-bottom: 0;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }

        .input-group input {
            width: 70px;
            padding: 8px;
            border: 2px solid #eaeaea;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            outline: none;
            transition: border-color var(--transition-speed), background-color var(--transition-speed);
        }
        .input-group input:focus {
            border-color: var(--secondary-color);
            background-color: #fcfdfe;
        }

        /* Müasir və canlandırılmış Hesablama Düyməsi */
        .calc-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), #1a252f);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.2);
            transition: all var(--transition-speed) ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }

        .calc-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 62, 80, 0.4);
            background: linear-gradient(135deg, #34495e, #2c3e50);
        }

        .calc-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(44, 62, 80, 0.2);
        }

        footer {
            text-align: center;
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 25px;
            font-weight: bold;
        }

        /* Planşet və Kompüterlər üçün əlavə düzəliş */
        @media(min-width: 600px) {
            .group-selector-box {
                flex-direction: row;
            }
            .group-selector-box label {
                margin-right: 15px;
                margin-bottom: 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>İMTAHAN NƏTİCƏLƏRİNİN HESABLANMASI</h1>
        <p style="margin: 8px 0 0 0; opacity: 0.8; font-size: 14px;">Qrupu seçin, xalları daxil edin və nəticəni öyrənin</p>
    </header>

    <div class="group-selector-box">
        <label for="group-select" style="font-weight: bold; color: var(--primary-color);">İxtisas Qrupu Seçin:</label>
        <select id="group-select" class="group-select" onchange="qrupDeyis()">
            <option value="1">1-ci Qrup (Riyaziyyat, Fizika, İnformatika/Kimya)</option>
            <option value="2">2-ci Qrup (Riyaziyyat, Coğrafiya, Tarix)</option>
            <option value="3">3-cü Qrup (Azərbaycan Dili, Tarix, Ədəbiyyat/Xarici Dil)</option>
            <option value="4">4-cü Qrup (Biologiya, Kimya, Fizika)</option>
        </select>
    </div>

    <div class="total-score" id="global-total">Ümumi Toplanmış Bal: 0.0</div>

    <div class="subjects-grid">
        <div class="card" id="card-f1">
            <div class="card-header">
                <span id="name-f1">Riyaziyyat (Əmsal: 1.5)</span>
                <span class="nisbi-bal" id="bal-f1">0.0 Bal</span>
            </div>
            <div class="card-body">
                <div class="input-group"><label>Qapalı Düzgün:</label><input type="number" id="qd-f1" value="0" min="0" max="22" oninput="limitYoxla(this, 22); qapaliCemYoxla('f1')"></div>
                <div class="input-group"><label>Qapalı Səhv:</label><input type="number" id="qs-f1" value="0" min="0" max="22" oninput="limitYoxla(this, 22); qapaliCemYoxla('f1')"></div>
                <div class="input-group"><label>Açıq Düzgün:</label><input type="number" id="ad-f1" value="0" min="0" max="5" oninput="limitYoxla(this, 5)"></div>
                <div class="input-group"><label>Yazı İşləri (Maks 3):</label><input type="number" id="yi-f1" value="0" min="0" max="3" step="0.5" oninput="limitYoxla(this, 3)"></div>
            </div>
        </div>

        <div class="card" id="card-f2" style="border-top-color: #e67e22;">
            <div class="card-header">
                <span id="name-f2">Fizika (Əmsal: 1.5)</span>
                <span class="nisbi-bal" style="background:#e67e22;" id="bal-f2">0.0 Bal</span>
            </div>
            <div class="card-body">
                <div class="input-group"><label>Qapalı Düzgün:</label><input type="number" id="qd-f2" value="0" min="0" max="22" oninput="limitYoxla(this, 22); qapaliCemYoxla('f2')"></div>
                <div class="input-group"><label>Qapalı Səhv:</label><input type="number" id="qs-f2" value="0" min="0" max="22" oninput="limitYoxla(this, 22); qapaliCemYoxla('f2')"></div>
                <div class="input-group"><label>Açıq Düzgün:</label><input type="number" id="ad-f2" value="0" min="0" max="5" oninput="limitYoxla(this, 5)"></div>
                <div class="input-group"><label>Yazı İşləri (Maks 3):</label><input type="number" id="yi-f2" value="0" min="0" max="3" step="0.5" oninput="limitYoxla(this, 3)"></div>
            </div>
        </div>

        <div class="card" id="card-f3" style="border-top-color: #2ecc71;">
            <div class="card-header">
                <span id="name-f3">İnformatika/Kimya (Əmsal: 1.0)</span>
                <span class="nisbi-bal" style="background:#2ecc71;" id="bal-f3">0.0 Bal</span>
            </div>
            <div class="card-body">
                <div class="input-group"><label>Qapalı Düzgün:</label><input type="number" id="qd-f3" value="0" min="0" max="22" oninput="limitYoxla(this, 22); qapaliCemYoxla('f3')"></div>
                <div class="input-group"><label>Qapalı Səhv:</label><input type="number" id="qs-f3" value="0" min="0" max="22" oninput="limitYoxla(this, 22); qapaliCemYoxla('f3')"></div>
                <div class="input-group"><label>Açıq Düzgün:</label><input type="number" id="ad-f3" value="0" min="0" max="5" oninput="limitYoxla(this, 5)"></div>
                <div class="input-group"><label>Yazı İşləri (Maks 3):</label><input type="number" id="yi-f3" value="0" min="0" max="3" step="0.5" oninput="limitYoxla(this, 3)"></div>
            </div>
        </div>
    </div>

    <button class="calc-btn" onclick="hesabla()">BALI HESABLA</button>

    <footer>
        TOT
    </footer>
</div>

<script>
const qrupMəlumatları = {
    "1": { f1: "Riyaziyyat (Əmsal: 1.5)", f2: "Fizika (Əmsal: 1.5)", f3: "İnformatika/Kimya (Əmsal: 1.0)", emsal1: 1.5, emsal2: 1.5, emsal3: 1.0 },
    "2": { f1: "Riyaziyyat (Əmsal: 1.5)", f2: "Coğrafiya (Əmsal: 1.5)", f3: "Tarix (Əmsal: 1.0)", emsal1: 1.5, emsal2: 1.5, emsal3: 1.0 },
    "3": { f1: "Azərbaycan Dili (Əmsal: 1.5)", f2: "Tarix (Əmsal: 1.5)", f3: "Ədəbiyyat/Xarici Dil (Əmsal: 1.0)", emsal1: 1.5, emsal2: 1.5, emsal3: 1.0 },
    "4": { f1: "Biologiya (Əmsal: 1.5)", f2: "Kimya (Əmsal: 1.5)", f3: "Fizika (Əmsal: 1.0)", emsal1: 1.5, emsal2: 1.5, emsal3: 1.0 }
};

function qrupDeyis() {
    let qrup = document.getElementById("group-select").value;
    document.getElementById("name-f1").innerText = qrupMəlumatları[qrup].f1;
    document.getElementById("name-f2").innerText = qrupMəlumatları[qrup].f2;
    document.getElementById("name-f3").innerText = qrupMəlumatları[qrup].f3;
    
    document.getElementById("bal-f1").innerText = "0.0 Bal";
    document.getElementById("bal-f2").innerText = "0.0 Bal";
    document.getElementById("bal-f3").innerText = "0.0 Bal";
    document.getElementById("global-total").innerText = "Ümumi Toplanmış Bal: 0.0";
}

function limitYoxla(input, max) {
    if (input.value === "") return;
    let val = parseFloat(input.value);
    if (val > max) input.value = max;
    if (val < 0) input.value = 0;
}

function qapaliCemYoxla(fennId) {
    let qdInput = document.getElementById('qd-' + fennId);
    let qsInput = document.getElementById('qs-' + fennId);
    let qd = parseFloat(qdInput.value) || 0;
    let qs = parseFloat(qsInput.value) || 0;
    
    if (qd + qs > 22) {
        qsInput.value = 22 - qd;
    }
}

function hesablaFenn(qd, qs, ad, yi) {
    let netice = (qd - (qs * 0.25) + ad + (2 * yi)) * 100 / 33;
    if (netice < 0) netice = 0;
    return Math.round(netice * 10) / 10; 
}

function hesabla() {
    let qrup = document.getElementById("group-select").value;
    let konfiq = qrupMəlumatları[qrup];

    let qdf1 = parseFloat(document.getElementById('qd-f1').value) || 0;
    let qsf1 = parseFloat(document.getElementById('qs-f1').value) || 0;
    let adf1 = parseFloat(document.getElementById('ad-f1').value) || 0;
    let yif1 = parseFloat(document.getElementById('yi-f1').value) || 0;
    let balF1 = hesablaFenn(qdf1, qsf1, adf1, yif1);
    document.getElementById('bal-f1').innerText = balF1 + " Bal";

    let qdf2 = parseFloat(document.getElementById('qd-f2').value) || 0;
    let qsf2 = parseFloat(document.getElementById('qs-f2').value) || 0;
    let adf2 = parseFloat(document.getElementById('ad-f2').value) || 0;
    let yif2 = parseFloat(document.getElementById('yi-f2').value) || 0;
    let balF2 = hesablaFenn(qdf2, qsf2, adf2, yif2);
    document.getElementById('bal-f2').innerText = balF2 + " Bal";

    let qdf3 = parseFloat(document.getElementById('qd-f3').value) || 0;
    let qsf3 = parseFloat(document.getElementById('qs-f3').value) || 0;
    let adf3 = parseFloat(document.getElementById('ad-f3').value) || 0;
    let yif3 = parseFloat(document.getElementById('yi-f3').value) || 0;
    let balF3 = hesablaFenn(qdf3, qsf3, adf3, yif3);
    document.getElementById('bal-f3').innerText = balF3 + " Bal";

    let umumiBal = (balF1 * konfiq.emsal1) + (balF2 * konfiq.emsal2) + (balF3 * konfiq.emsal3);
    
    // Ümumi bal sahəsinə animasiya əlavə edirik
    let totalDiv = document.getElementById('global-total');
    totalDiv.innerText = "Ümumi Toplanmış Bal: " + (Math.round(umumiBal * 10) / 10);
    
    totalDiv.classList.remove('updated');
    void totalDiv.offsetWidth; // Animasiyanı sıfırlamaq üçün trick
    totalDiv.classList.add('updated');
}
</script>

</body>
</html>
