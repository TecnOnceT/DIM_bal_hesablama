<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İmtahan Balı Hesablayıcı</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), #1a252f);
            color: #fff;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .student-info {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .info-item {
            font-size: 15px;
        }

        .info-item strong {
            color: var(--primary-color);
        }

        .total-score {
            grid-column: 1 / -1;
            background: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 22px;
            color: var(--secondary-color);
            font-weight: bold;
            border: 1px solid #d4e6f1;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
            border-top: 5px solid var(--secondary-color);
        }

        .card-header {
            background: #f8f9fa;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nisbi-bal {
            background: var(--primary-color);
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
        }

        .card-body {
            padding: 20px;
        }

        .input-group {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 60px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }

        .calc-btn {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 25px;
        }

        .calc-btn:hover {
            background: #1a252f;
        }

        footer {
            text-align: center;
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>İMTAHAN NƏTİCƏLƏRİNİN HESABLANMASI</h1>
        <p style="margin: 5px 0 0 0; opacity: 0.8; font-size: 14px;">Xalları daxil edin və ümumi balı öyrənin</p>
    </header>

    <div class="student-info">

        <div class="total-score" id="global-total">Ümumi Toplanmış Bal: 0.0</div>
    </div>

    <div class="subjects-grid">
        <div class="card">
            <div class="card-header">
                <span>Riyaziyyat (Əmsal: 1.5)</span>
                <span class="nisbi-bal" id="bal-riyaziyyat">0.0 Bal</span>
            </div>
            <div class="card-body">
                <div class="input-group"><label>Qapalı Düzgün:</label><input type="number" id="qd-riy" value="0" min="0" max="22"></div>
                <div class="input-group"><label>Qapalı Səhv:</label><input type="number" id="qs-riy" value="0" min="0" max="22"></div>
                <div class="input-group"><label>Açıq Düzgün:</label><input type="number" id="ad-riy" value="0" min="0" max="5"></div>
                <div class="input-group"><label>Yazı İşləri (Maks 3):</label><input type="number" id="yi-riy" value="0" min="0" max="3" step="0.5"></div>
            </div>
        </div>

        <div class="card" style="border-top-color: #e67e22;">
            <div class="card-header">
                <span>Fizika (Əmsal: 1.5)</span>
                <span class="nisbi-bal" style="background:#e67e22;" id="bal-fizika">0.0 Bal</span>
            </div>
            <div class="card-body">
                <div class="input-group"><label>Qapalı Düzgün:</label><input type="number" id="qd-fiz" value="0" min="0" max="22"></div>
                <div class="input-group"><label>Qapalı Səhv:</label><input type="number" id="qs-fiz" value="0" min="0" max="22"></div>
                <div class="input-group"><label>Açıq Düzgün:</label><input type="number" id="ad-fiz" value="0" min="0" max="5"></div>
                <div class="input-group"><label>Yazı İşləri (Maks 3):</label><input type="number" id="yi-fiz" value="0" min="0" max="3" step="0.5"></div>
            </div>
        </div>

        <div class="card" style="border-top-color: #2ecc71;">
            <div class="card-header">
                <span>İnformatika/Kimya (Əmsal: 1.0)</span>
                <span class="nisbi-bal" style="background:#2ecc71;" id="bal-informatika">0.0 Bal</span>
            </div>
            <div class="card-body">
                <div class="input-group"><label>Qapalı Düzgün:</label><input type="number" id="qd-inf" value="0" min="0" max="22"></div>
                <div class="input-group"><label>Qapalı Səhv:</label><input type="number" id="qs-inf" value="0" min="0" max="22"></div>
                <div class="input-group"><label>Açıq Düzgün:</label><input type="number" id="ad-inf" value="0" min="0" max="5"></div>
                <div class="input-group"><label>Yazı İşləri (Maks 3):</label><input type="number" id="yi-inf" value="0" min="0" max="3" step="0.5"></div>
            </div>
        </div>
    </div>

    <button class="calc-btn" onclick="hesabla()">BALI HESABLA</button>

    <footer>
        TOT
    </footer>
</div>

<script>
function hesablaFenn(qd, qs, ad, yi) {
    let netice = (qd - (qs * 0.25) + ad + (2 * yi)) * 100 / 33;
    if (netice < 0) netice = 0;
    return Math.round(netice * 10) / 10; 
}

function hesabla() {
    // Riyaziyyat
    let qdRiy = parseFloat(document.getElementById('qd-riy').value) || 0;
    let qsRiy = parseFloat(document.getElementById('qs-riy').value) || 0;
    let adRiy = parseFloat(document.getElementById('ad-riy').value) || 0;
    let yiRiy = parseFloat(document.getElementById('yi-riy').value) || 0;
    let balRiy = hesablaFenn(qdRiy, qsRiy, adRiy, yiRiy);
    document.getElementById('bal-riyaziyyat').innerText = balRiy + " Bal";

    // Fizika
    let qdFiz = parseFloat(document.getElementById('qd-fiz').value) || 0;
    let qsFiz = parseFloat(document.getElementById('qs-fiz').value) || 0;
    let adFiz = parseFloat(document.getElementById('ad-fiz').value) || 0;
    let yiFiz = parseFloat(document.getElementById('yi-fiz').value) || 0;
    let balFiz = hesablaFenn(qdFiz, qsFiz, adFiz, yiFiz);
    document.getElementById('bal-fizika').innerText = balFiz + " Bal";

    // İnformatika
    let qdInf = parseFloat(document.getElementById('qd-inf').value) || 0;
    let qsInf = parseFloat(document.getElementById('qs-inf').value) || 0;
    let adInf = parseFloat(document.getElementById('ad-inf').value) || 0;
    let yiInf = parseFloat(document.getElementById('yi-inf').value) || 0;
    let balInf = hesablaFenn(qdInf, qsInf, adInf, yiInf);
    document.getElementById('bal-informatika').innerText = balInf + " Bal";

    // Ümumi Bal Hesablanması (Riyaziyyat*1.5 + Fizika*1.5 + İnformatika*1.0)
    let umumiBal = (balRiy * 1.5) + (balFiz * 1.5) + (balInf * 1.0);
    document.getElementById('global-total').innerText = "Ümumi Toplanmış Bal: " + Math.round(umumiBal * 10) / 10;
}
</script>

</body>
</html>
